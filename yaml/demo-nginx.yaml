apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: monitoring
  name: demo-nginx
spec:
  replicas: 1
  selector:
    matchLabels:
      app: demo-nginx
  template:
    metadata:
      labels:
        app: demo-nginx
    spec:
      containers:
      - name: nginx
        image: nginx:latest
        ports:
        - containerPort: 80
          name: http
        resources:
          requests:
            cpu: "50m"
            memory: "64Mi"
          limits:
            cpu: "200m"
            memory: "128Mi"
      - name: nginx-exporter
        image: nginx/nginx-prometheus-exporter:latest
        args:
          - -nginx.scrape-uri=http://localhost/stub_status
        ports:
        - containerPort: 9113
          name: metrics
        resources:
          requests:
            cpu: "20m"
            memory: "32Mi"
          limits:
            cpu: "100m"
            memory: "64Mi"
      - name: demo-nginx-otel
        image: otel/opentelemetry-collector-contrib:0.98.0
        args:
          - "--config=/etc/otelcol/config.yaml"
        resources:
          requests:
            cpu: "20m"
            memory: "64Mi"
          limits:
            cpu: "200m"
            memory: "128Mi"
        volumeMounts:
          - name: otel-config
            mountPath: /etc/otelcol
      volumes:
        - name: otel-config
          configMap:
            name: demo-nginx-otel-config
---
apiVersion: v1
kind: ConfigMap
metadata:
  namespace: monitoring
  name: demo-nginx-otel-config
data:
  config.yaml: |
    receivers:
      prometheus:
        config:
          scrape_configs:
            - job_name: demo-nginx
              metrics_path: /metrics
              static_configs:
                - targets: ["127.0.0.1:9113"]
    processors:
      resource:
        attributes:
          - key: service.name
            value: demo-nginx
            action: insert
          - key: service.namespace
            value: monitoring
            action: insert
          - key: app
            value: demo-nginx
            action: insert
          - key: namespace
            value: monitoring
            action: insert
      batch:
    exporters:
      otlphttp:
        endpoint: http://otel-metrics.monitoring:4318
    service:
      pipelines:
        metrics:
          receivers: [prometheus]
          processors: [resource, batch]
          exporters: [otlphttp]
---
apiVersion: v1
kind: Service
metadata:
  namespace: monitoring
  name: demo-nginx
spec:
  selector:
    app: demo-nginx
  ports:
  - protocol: TCP
    port: 80
    targetPort: 80
