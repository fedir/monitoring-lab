apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: monitoring
  name: demo-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: demo-app
  template:
    metadata:
      labels:
        app: demo-app
    spec:
      containers:
      - name: demo-app
        image: stefanprodan/podinfo:latest
        ports:
        - containerPort: 9898
          name: metrics
        resources:
          requests:
            cpu: "50m"
            memory: "64Mi"
          limits:
            cpu: "200m"
            memory: "128Mi"
      - name: demo-app-otel
        image: otel/opentelemetry-collector-contrib:0.98.0
        args:
          - "--config=/etc/otelcol/config.yaml"
        resources:
          requests:
            cpu: "20m"
            memory: "64Mi"
          limits:
            cpu: "200m"
            memory: "128Mi"
        volumeMounts:
          - name: otel-config
            mountPath: /etc/otelcol
      volumes:
        - name: otel-config
          configMap:
            name: demo-app-otel-config
---
apiVersion: v1
kind: ConfigMap
metadata:
  namespace: monitoring
  name: demo-app-otel-config
data:
  config.yaml: |
    receivers:
      prometheus:
        config:
          scrape_configs:
            - job_name: demo-app
              metrics_path: /metrics
              static_configs:
                - targets: ["127.0.0.1:9898"]
    processors:
      resource:
        attributes:
          - key: service.name
            value: demo-app
            action: insert
          - key: service.namespace
            value: monitoring
            action: insert
          - key: app
            value: demo-app
            action: insert
          - key: namespace
            value: monitoring
            action: insert
      batch:
    exporters:
      otlphttp:
        endpoint: http://otel-metrics.monitoring:4318
    service:
      pipelines:
        metrics:
          receivers: [prometheus]
          processors: [resource, batch]
          exporters: [otlphttp]
---
apiVersion: v1
kind: Service
metadata:
  namespace: monitoring
  name: demo-app
spec:
  selector:
    app: demo-app
  ports:
  - protocol: TCP
    port: 80
    targetPort: 9898
