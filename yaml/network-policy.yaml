apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  namespace: monitoring
  name: allow-prometheus-ingress
spec:
  podSelector:
    matchLabels:
      app: prometheus
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: alloy
        - podSelector:
            matchLabels:
              app: grafana
        - podSelector:
            matchLabels:
              app: tempo
        - podSelector:
            matchLabels:
              app: otel-metrics
      ports:
        - protocol: TCP
          port: 9090
---
