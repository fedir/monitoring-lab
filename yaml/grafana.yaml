apiVersion: v1
kind: ConfigMap
metadata:
  namespace: monitoring
  name: grafana-alerting
data:
  contact-points.yaml: |
    apiVersion: 1
    contactPoints:
      - orgId: 1
        name: Alert Webhook
        receivers:
          - uid: alert-webhook
            type: webhook
            settings:
              url: http://alert-webhook:8080/alerts
              httpMethod: POST
            disableResolveMessage: false
  notification-policies.yaml: |
    apiVersion: 1
    policies:
      - orgId: 1
        receiver: Alert Webhook
        group_by: ["alertname", "app", "namespace"]
        group_wait: 30s
        group_interval: 5m
        repeat_interval: 2h
  alert-rules.yaml: |
    apiVersion: 1
    groups:
      - orgId: 1
        name: grafana-rules
        folder: Alerts
        interval: 1m
        rules:
          - uid: grafana-demo-app-high-latency
            title: Demo App High Latency (Grafana)
            condition: C
            data:
              - refId: A
                datasourceUid: prometheus
                relativeTimeRange:
                  from: 300
                  to: 0
                model:
                  expr: histogram_quantile(0.95, sum(rate(duration_milliseconds_bucket{app=~"demo-app|demo-nginx"}[5m])) by (le, app))
                  intervalMs: 1000
                  maxDataPoints: 43200
              - refId: B
                datasourceUid: __expr__
                model:
                  type: reduce
                  expression: A
                  reducer: "last"
              - refId: C
                datasourceUid: __expr__
                model:
                  type: classic_conditions
                  conditions:
                    - evaluator:
                        type: gt
                        params: [500]
                      operator:
                        type: and
                      query:
                        params: [B]
                      reducer:
                        type: last
                      type: query
            for: 5m
            annotations:
              summary: High latency on {{ $labels.app }}
            labels:
              severity: warning
            noDataState: NoData
            execErrState: Error
            isPaused: false
---
