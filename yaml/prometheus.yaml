apiVersion: v1
kind: ConfigMap
metadata:
  namespace: monitoring
  name: prometheus-config
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
    rule_files:
      - /etc/prometheus/rules.yml
    alerting:
      alertmanagers:
        - static_configs:
            - targets: ["alertmanager:9093"]
    scrape_configs:
      - job_name: 'prometheus'
        static_configs:
          - targets: ['localhost:9090']
  rules.yml: |
    groups:
      - name: monitoring-stack
        rules:
          - alert: ServiceDown
            expr: |
              label_replace(
                kube_deployment_status_replicas_available{namespace="monitoring", deployment=~"demo-app|demo-nginx|grafana|prometheus|loki|tempo|kube-state-metrics|alertmanager|alert-webhook"} < 1,
                "app",
                "$1",
                "deployment",
                "(.*)"
              )
              or label_replace(
                kube_daemonset_status_number_ready{namespace="monitoring", daemonset=~"alloy|node-exporter"} < 1,
                "app",
                "$1",
                "daemonset",
                "(.*)"
              )
            for: 5s
            labels:
              severity: critical
            annotations:
              summary: "{{ $labels.app }} is down"
              description: "{{ $labels.app }} in namespace {{ $labels.namespace }} has been down for more than 5 seconds."
          - alert: DemoAppHighLatency
            expr: histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket{app="demo-app"}[5m])) by (le)) > 0.5
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "High latency on demo-app"
              description: "p95 latency for demo-app exceeded 500ms for 5 minutes."
---
apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: monitoring
  name: prometheus
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
      labels:
        app: prometheus
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:v2.51.0
          args:
            - "--config.file=/etc/prometheus/prometheus.yml"
            - "--storage.tsdb.path=/prometheus"
            - "--enable-feature=remote-write-receiver"
          ports:
            - containerPort: 9090
          resources:
            requests:
              cpu: "200m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
            - name: storage
              mountPath: /prometheus
      volumes:
        - name: config
          configMap:
            name: prometheus-config
        - name: storage
          persistentVolumeClaim:
            claimName: prometheus-pvc
---
apiVersion: v1
kind: Service
metadata:
  namespace: monitoring
  name: prometheus
spec:
  ports:
    - port: 9090
      targetPort: 9090
  selector:
    app: prometheus
